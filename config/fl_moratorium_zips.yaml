metadata:
  last_updated: "2024-06-01"
  source: "FL DOI Emergency Order 2024-01 + prior orders"
  description: >
    Coastal ZIP codes subject to new-business moratorium for property coverage.
    These ZIPs are in high-catastrophe-exposure coastal areas where admitted
    carriers have withdrawn or been restricted from writing new business.

